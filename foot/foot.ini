[main]
font=JetBrains Mono Nerd Font:size=15:style=Bold

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000
multiplier=3.0

# Catppuccin Mocha Colors
# ~/.config/foot/foot.ini
[colors]
alpha=1
foreground=e2e2e8
background=161622  # Очень тёмный фон

regular0=2d2d44   # Тёмно-серо-синий
regular1=ff6b8b   # Тёплый розовый
regular2=4cd964   # Яблочно-зелёный
regular3=ffcc00   # Золотой
regular4=007aff    # ЯРКИЙ синий iOS-style (акцентный)
regular5=af52de   # Пурпурный
regular6=5ac8fa   # Светло-голубой
regular7=8e8e93   # Серый

bright0=3d3d5c    # Светло-синий
bright1=ff8fa3    # Светло-розовый
bright2=52d468    # Светло-зелёный
bright3=ffd60a    # Ярко-жёлтый
bright4=0a84ff    # НЕОНОВО-СИНИЙ (супер яркий)
bright5=bf5af2    # Ярко-фиолетовый
bright6=64d2ff    # Ярко-голубой
bright7=aeaeb2    # Светло-серый
